name: GM-Bench CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-questions:
    name: Validate Question Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema>=4.0.0

      - name: Run question validator
        run: python scripts/validate_questions.py

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check harness/ scripts/
